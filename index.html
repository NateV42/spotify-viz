<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vizify</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=Bebas+Neue&display=swap" rel="stylesheet">
<script src="https://www.youtube.com/iframe_api"></script>
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  body{background:#000;color:#fff;font-family:'DM Mono',monospace;height:100vh;overflow:hidden;display:flex;align-items:center;justify-content:center;}

  #login-screen{display:flex;flex-direction:column;align-items:center;animation:fadeIn 1.2s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  .logo{font-family:'Bebas Neue',sans-serif;font-size:5.5rem;letter-spacing:.14em;line-height:1;background:linear-gradient(135deg,#1DB954,#00d4ff 60%,#b060ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.4rem;}
  .sub{font-size:.65rem;letter-spacing:.35em;color:#444;text-transform:uppercase;margin-bottom:3rem;}
  .connect-btn{background:#1DB954;color:#000;border:none;padding:15px 52px;border-radius:40px;font-family:'DM Mono',monospace;font-size:.8rem;letter-spacing:.18em;text-transform:uppercase;cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:0 0 50px rgba(29,185,84,.25);}
  .connect-btn:hover{transform:scale(1.05);box-shadow:0 0 70px rgba(29,185,84,.5);}

  #player{display:none;width:100vw;height:100vh;position:relative;background:#000;}

  /* YouTube fullscreen */
  #yt-wrap{position:absolute;inset:0;z-index:1;background:#000;}
  #yt-wrap iframe,#yt-div{width:100%!important;height:100%!important;border:none;}

  /* No video fallback */
  #no-video{position:absolute;inset:0;z-index:1;display:none;align-items:center;justify-content:center;background:radial-gradient(ellipse at center,#111 0%,#000 100%);}
  #no-video p{font-size:.7rem;letter-spacing:.3em;color:#222;text-transform:uppercase;}

  /* Overlay on top of video */
  #overlay{position:absolute;bottom:0;left:0;right:0;z-index:10;padding:120px 40px 32px;background:linear-gradient(transparent,rgba(0,0,0,.92));display:flex;flex-direction:column;gap:10px;pointer-events:none;}

  #lyrics-block{text-align:center;min-height:5rem;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:4px;margin-bottom:8px;}
  #lyric-prev{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.08em;color:rgba(255,255,255,.2);transition:all .5s;}
  #lyric-current{font-family:'Bebas Neue',sans-serif;font-size:2.6rem;letter-spacing:.07em;color:#fff;text-shadow:0 0 40px var(--tglow,rgba(255,255,255,.5));transition:color .6s,text-shadow .6s;line-height:1.1;}
  #lyric-next{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.08em;color:rgba(255,255,255,.22);transition:all .5s;}

  #track-row{display:flex;align-items:flex-end;justify-content:space-between;gap:24px;}
  #track-name{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:.07em;line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:60vw;}
  #artist-name{font-size:.65rem;letter-spacing:.22em;color:#555;margin-top:4px;text-transform:uppercase;}
  #bpm-display{font-size:.55rem;letter-spacing:.15em;color:#333;}

  #controls{position:absolute;top:18px;right:18px;z-index:20;display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;pointer-events:all;}
  .ctrl{background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.08);color:#444;font-family:'DM Mono',monospace;font-size:.56rem;letter-spacing:.18em;text-transform:uppercase;padding:7px 13px;border-radius:20px;cursor:pointer;transition:color .2s,border-color .2s;backdrop-filter:blur(10px);}
  .ctrl:hover{color:#aaa;border-color:rgba(255,255,255,.2);}
  .ctrl.lights-on{color:#ffcc00;border-color:rgba(255,204,0,.4);}

  #status{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:5;text-align:center;pointer-events:none;}
  #status p{font-size:.68rem;letter-spacing:.25em;color:#1a1a1a;text-transform:uppercase;}

  #sp-logo{position:absolute;top:20px;left:22px;z-index:10;display:flex;align-items:center;gap:8px;opacity:.3;pointer-events:none;}
  #sp-logo svg{width:14px;height:14px;fill:#1DB954;}
  #sp-logo span{font-size:.55rem;letter-spacing:.2em;color:#2a2a2a;text-transform:uppercase;}

  #ha-modal{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.9);backdrop-filter:blur(14px);align-items:center;justify-content:center;}
  #ha-modal.open{display:flex;}
  #ha-box{background:#060606;border:1px solid #181818;border-radius:18px;padding:32px;width:500px;max-width:92vw;max-height:80vh;overflow-y:auto;}
  #ha-box h2{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:.1em;margin-bottom:4px;}
  #ha-box .hint{font-size:.6rem;color:#333;letter-spacing:.12em;margin-bottom:20px;text-transform:uppercase;}
  #ha-status{font-size:.6rem;color:#444;letter-spacing:.1em;margin-bottom:12px;min-height:1rem;}
  #lights-list{display:flex;flex-direction:column;gap:5px;margin-bottom:18px;}
  .light-item{display:flex;align-items:center;gap:12px;padding:10px 14px;border:1px solid #141414;border-radius:10px;cursor:pointer;transition:border-color .2s,background .2s;}
  .light-item:hover{border-color:#252525;}
  .light-item.selected{border-color:rgba(29,185,84,.4);background:rgba(29,185,84,.04);}
  .light-dot{width:8px;height:8px;border-radius:50%;background:#ffcc00;flex-shrink:0;box-shadow:0 0 5px rgba(255,204,0,.4);}
  .light-name{font-size:.68rem;letter-spacing:.08em;color:#999;flex:1;}
  .light-check{font-size:.68rem;color:#1DB954;opacity:0;transition:opacity .2s;}
  .light-item.selected .light-check{opacity:1;}
  #ha-btn-row{display:flex;gap:10px;}
  .ha-btn{flex:1;padding:12px;border-radius:10px;border:none;font-family:'DM Mono',monospace;font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:opacity .2s;}
  .ha-btn.primary{background:#1DB954;color:#000;}
  .ha-btn.secondary{background:#141414;color:#444;}
  .ha-btn:hover{opacity:.82;}
  .sel-all-row{display:flex;justify-content:flex-end;margin-bottom:8px;}
  .sel-all-btn{font-size:.58rem;letter-spacing:.15em;color:#333;text-transform:uppercase;cursor:pointer;border:none;background:none;font-family:'DM Mono',monospace;}
  .sel-all-btn:hover{color:#777;}
</style>
</head>
<body>

<div id="login-screen">
  <div class="logo">VIZIFY</div>
  <div class="sub">Spotify · YouTube · Lyrics</div>
  <button class="connect-btn" onclick="login()">Connect Spotify</button>
</div>

<div id="player">
  <div id="sp-logo">
    <svg viewBox="0 0 24 24"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
    <span>Live</span>
  </div>

  <div id="yt-wrap"><div id="yt-div"></div></div>
  <div id="no-video"><p>No video found — playing audio only</p></div>
  <div id="status"><p>Waiting for Spotify...</p></div>

  <div id="overlay">
    <div id="lyrics-block">
      <div id="lyric-prev"></div>
      <div id="lyric-current"></div>
      <div id="lyric-next"></div>
    </div>
    <div id="track-row">
      <div id="track-info">
        <div id="track-name">—</div>
        <div id="artist-name">—</div>
      </div>
      <div id="bpm-display">— BPM</div>
    </div>
  </div>

  <div id="controls">
    <div class="ctrl" id="lights-btn" onclick="openLightsModal()">Lights</div>
    <div class="ctrl" onclick="toggleFullscreen()">Fullscreen</div>
    <div class="ctrl" onclick="logout()">Disconnect</div>
  </div>
</div>

<div id="ha-modal">
  <div id="ha-box">
    <h2>Smart Lights</h2>
    <div class="hint">Select lights to sync with the beat</div>
    <div id="ha-status">Connecting...</div>
    <div class="sel-all-row"><button class="sel-all-btn" onclick="selectAll()">Select all</button></div>
    <div id="lights-list"></div>
    <div id="ha-btn-row">
      <button class="ha-btn secondary" onclick="closeLightsModal()">Cancel</button>
      <button class="ha-btn primary" onclick="saveLights()">Sync Selected</button>
    </div>
  </div>
</div>

<script>
const CLIENT_ID    = '23267977d16d48e1a9495de2b38e63c1';
const REDIRECT_URI = 'https://natev42.github.io/spotify-viz';
const SCOPES       = 'user-read-currently-playing user-read-playback-state';
const YT_KEY       = 'AIzaSyCDR7-_K3eMUaijeS7zo0nD1gv0vnDIs4Y';
const HA_URL       = 'http://homeassistant.local:8123';
const HA_TOKEN     = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiI3MWU4MzZjZmMxMjY0NjMzOTc3NDEzYjVjNDc1NWUxZCIsImlhdCI6MTc3Nzg0NDUxNywiZXhwIjoyMDkzMjA0NTE3fQ.isDztHb5r-xuHTFMBfm5fep9mhdssU73NhmDWIhu5RE';
const YT_SKIP      = 12;

let accessToken    = null;
let currentTrackId = null;
let pollTimer      = null;
let ytPlayer       = null;
let ytApiReady     = false;
let lightsActive   = false;
let allLights      = [];
let selectedLights = [];
let lastLightBeat  = 0;
let beatTimer      = null;
let syncedLyrics   = [];
let currentLyricIdx= -1;
let playbackMs     = 0;
let lastPollAt     = 0;
let tempo          = 120;
let energy         = 0.5;
let currentHue     = 200;

// ── YOUTUBE IFRAME API ────────────────────────────────────────────────────────
window.onYouTubeIframeAPIReady = () => { ytApiReady = true; };

function loadVideo(videoId) {
  killPlayer();
  document.getElementById('yt-wrap').style.display = 'block';
  document.getElementById('no-video').style.display = 'none';

  function doCreate() {
    document.getElementById('yt-div').innerHTML = '';
    ytPlayer = new YT.Player('yt-div', {
      width: '100%',
      height: '100%',
      videoId,
      playerVars: {
        autoplay: 1,
        mute: 1,
        controls: 0,
        rel: 0,
        modestbranding: 1,
        loop: 1,
        playlist: videoId,
        enablejsapi: 1,
        origin: window.location.origin,
      },
      events: {
        onReady(e) {
          e.target.mute();
          e.target.setVolume(0);
          e.target.seekTo(YT_SKIP, true);
          e.target.playVideo();
        },
        onStateChange(e) {
          try { e.target.mute(); e.target.setVolume(0); } catch(_) {}
          if (e.data === YT.PlayerState.PLAYING) {
            try { if (e.target.getCurrentTime() < YT_SKIP - 1) e.target.seekTo(YT_SKIP, true); } catch(_) {}
          }
        }
      }
    });
  }

  if (ytApiReady) doCreate();
  else { const c = setInterval(() => { if (ytApiReady) { clearInterval(c); doCreate(); } }, 200); }
}

function killPlayer() {
  if (ytPlayer) {
    try { ytPlayer.stopVideo(); ytPlayer.destroy(); } catch(_) {}
    ytPlayer = null;
  }
  document.getElementById('yt-div').innerHTML = '';
}

function showNoVideo() {
  killPlayer();
  document.getElementById('yt-wrap').style.display = 'none';
  document.getElementById('no-video').style.display = 'flex';
}

// ── BEAT SYNC (timer-based from Spotify tempo) ────────────────────────────────
const LIGHT_HUES = [0, 30, 60, 120, 180, 220, 270, 300, 340];
let hueIdx = 0;

function startBeatSync() {
  if (beatTimer) clearInterval(beatTimer);
  const beatMs = 60000 / tempo;
  beatTimer = setInterval(() => {
    if (!lightsActive || !selectedLights.length) return;
    const hue = LIGHT_HUES[hueIdx % LIGHT_HUES.length];
    hueIdx++;
    currentHue = hue;
    const bri = Math.round(130 + energy * 120);
    selectedLights.forEach(id => haPost('/services/light/turn_on', { entity_id: id, hs_color: [hue, 100], brightness: bri, transition: 0 }));
    setTimeout(() => {
      if (!lightsActive) return;
      selectedLights.forEach(id => haPost('/services/light/turn_on', { entity_id: id, brightness: Math.round(15 + energy * 35), transition: 0 }));
    }, Math.min(beatMs * 0.4, 200));
  }, beatMs);
}

// ── KEYWORD → LIGHT HUE ───────────────────────────────────────────────────────
const LYRIC_HUES = {
  money:['money','cash','dollar','rich','gold','paid','bands','bag','flex'],
  fire: ['fire','burn','flame','hot','blaze','lit','hell','rage'],
  love: ['love','heart','kiss','baby','babe','forever','roses','soul','honey'],
  space:['space','stars','galaxy','moon','sky','cosmos','heaven','fly'],
  rain: ['rain','storm','tears','cry','flood','ocean','waves'],
  dark: ['dark','shadow','death','blood','pain','broken','fear','nightmare'],
  nature:['trees','flowers','green','forest','sunshine','bloom','earth'],
};
const HUE_MAP = { money:50, fire:10, love:340, space:220, rain:200, dark:260, nature:120 };

function lyricHue(text) {
  if (!text) return null;
  const lower = text.toLowerCase();
  for (const [theme, words] of Object.entries(LYRIC_HUES)) {
    if (words.some(w => lower.includes(w))) return HUE_MAP[theme];
  }
  return null;
}

// ── LRCLIB LYRICS ─────────────────────────────────────────────────────────────
async function fetchLyrics(artist, track, album) {
  syncedLyrics = []; currentLyricIdx = -1; clearLD();
  try {
    const q = new URLSearchParams({ artist_name: artist, track_name: track });
    if (album) q.set('album_name', album);
    const r = await fetch('https://lrclib.net/api/get?' + q);
    if (!r.ok) return;
    const d = await r.json();
    if (d.syncedLyrics) syncedLyrics = parseLRC(d.syncedLyrics);
    else if (d.plainLyrics) {
      const ls = d.plainLyrics.split('\n').filter(l => l.trim());
      syncedLyrics = ls.map((text, i) => ({ time: (i / ls.length) * 180000, text }));
    }
  } catch(e) { console.warn('Lyrics:', e); }
}
function parseLRC(lrc) {
  return lrc.split('\n').reduce((a, l) => {
    const m = l.match(/^\[(\d+):(\d+\.\d+)\](.*)/);
    if (m) { const ms = parseInt(m[1])*60000+parseFloat(m[2])*1000, t = m[3].trim(); if (t) a.push({ time: ms, text: t }); }
    return a;
  }, []).sort((a, b) => a.time - b.time);
}
function clearLD() { ['lyric-prev','lyric-current','lyric-next'].forEach(id => document.getElementById(id).textContent = ''); }

function tickLyrics() {
  if (!syncedLyrics.length) return;
  const now = playbackMs + (Date.now() - lastPollAt);
  let idx = -1;
  for (let i = 0; i < syncedLyrics.length; i++) { if (syncedLyrics[i].time <= now) idx = i; else break; }
  if (idx !== currentLyricIdx && idx >= 0) {
    currentLyricIdx = idx;
    const c = syncedLyrics[idx], p = syncedLyrics[idx-1], n = syncedLyrics[idx+1];
    document.getElementById('lyric-prev').textContent = p ? p.text : '';
    document.getElementById('lyric-current').textContent = c.text;
    document.getElementById('lyric-next').textContent = n ? n.text : '';
    // Flash lights to lyric theme color
    const h = lyricHue([p,c,n].filter(Boolean).map(l=>l.text).join(' '));
    if (h !== null) {
      document.documentElement.style.setProperty('--tglow', `hsla(${h},90%,65%,0.7)`);
      document.getElementById('lyric-current').style.color = `hsl(${h},95%,85%)`;
      if (lightsActive && selectedLights.length) {
        selectedLights.forEach(id => haPost('/services/light/turn_on', { entity_id: id, hs_color: [h, 90], brightness: 200, transition: 0.3 }));
      }
    }
  }
}

setInterval(tickLyrics, 100);

// ── HOME ASSISTANT ────────────────────────────────────────────────────────────
async function haGet(p) { try { return (await fetch(HA_URL+'/api'+p, { headers:{ Authorization:'Bearer '+HA_TOKEN,'Content-Type':'application/json' }})).json(); } catch { return null; } }
async function haPost(p, b) { try { await fetch(HA_URL+'/api'+p, { method:'POST', headers:{ Authorization:'Bearer '+HA_TOKEN,'Content-Type':'application/json' }, body:JSON.stringify(b) }); } catch {} }
async function loadAllLights() {
  document.getElementById('ha-status').textContent = 'Connecting...';
  const s = await haGet('/states');
  if (!s) { document.getElementById('ha-status').textContent = 'Could not reach HA — must be on home WiFi.'; return; }
  allLights = s.filter(x => x.entity_id.startsWith('light.'));
  document.getElementById('ha-status').textContent = `Found ${allLights.length} lights`;
  renderLights();
}
function renderLights() {
  const list = document.getElementById('lights-list'); list.innerHTML = '';
  allLights.forEach(l => {
    const sel = selectedLights.includes(l.entity_id), div = document.createElement('div');
    div.className = 'light-item' + (sel ? ' selected' : '');
    div.innerHTML = `<div class="light-dot"></div><div class="light-name">${l.attributes.friendly_name||l.entity_id}</div><div class="light-check">✓</div>`;
    div.onclick = () => {
      selectedLights = selectedLights.includes(l.entity_id) ? selectedLights.filter(id=>id!==l.entity_id) : [...selectedLights, l.entity_id];
      div.classList.toggle('selected', selectedLights.includes(l.entity_id));
      div.querySelector('.light-check').style.opacity = selectedLights.includes(l.entity_id) ? '1' : '0';
    };
    list.appendChild(div);
  });
}
function selectAll() { selectedLights = allLights.map(l => l.entity_id); renderLights(); }
function openLightsModal() { document.getElementById('ha-modal').classList.add('open'); loadAllLights(); }
function closeLightsModal() { document.getElementById('ha-modal').classList.remove('open'); }
function saveLights() {
  lightsActive = selectedLights.length > 0;
  document.getElementById('lights-btn').classList.toggle('lights-on', lightsActive);
  if (lightsActive) startBeatSync();
  else if (beatTimer) { clearInterval(beatTimer); beatTimer = null; }
  closeLightsModal();
}

// ── AUTH ──────────────────────────────────────────────────────────────────────
async function genV(){const a=new Uint8Array(32);crypto.getRandomValues(a);return btoa(String.fromCharCode(...a)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');}
async function genC(v){const d=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(v));return btoa(String.fromCharCode(...new Uint8Array(d))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');}
async function login(){const v=await genV(),c=await genC(v);sessionStorage.setItem('pkce',v);window.location='https://accounts.spotify.com/authorize?'+new URLSearchParams({client_id:CLIENT_ID,response_type:'code',redirect_uri:REDIRECT_URI,scope:SCOPES,code_challenge_method:'S256',code_challenge:c});}
async function exchangeCode(code){const r=await fetch('https://accounts.spotify.com/api/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:new URLSearchParams({grant_type:'authorization_code',code,redirect_uri:REDIRECT_URI,client_id:CLIENT_ID,code_verifier:sessionStorage.getItem('pkce')})});return(await r.json()).access_token;}

// ── SPOTIFY ───────────────────────────────────────────────────────────────────
async function spGet(path){const r=await fetch('https://api.spotify.com/v1'+path,{headers:{Authorization:'Bearer '+accessToken}});if(r.status===204||r.status===401)return null;return r.json();}

// ── YOUTUBE SEARCH ────────────────────────────────────────────────────────────
async function searchYT(artist, track) {
  const q = encodeURIComponent(artist+' '+track+' official music video');
  try {
    const r = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${q}&type=video&videoCategoryId=10&maxResults=1&key=${YT_KEY}`);
    const d = await r.json();
    if (d.items && d.items.length > 0) return d.items[0].id.videoId;
  } catch(e) { console.warn('YT:', e); }
  return null;
}

// ── CONTROLS ──────────────────────────────────────────────────────────────────
function toggleFullscreen(){if(!document.fullscreenElement)document.documentElement.requestFullscreen();else document.exitFullscreen();}
function logout(){accessToken=null;currentTrackId=null;clearInterval(pollTimer);if(beatTimer)clearInterval(beatTimer);killPlayer();document.getElementById('player').style.display='none';document.getElementById('login-screen').style.display='flex';}

// ── POLL ──────────────────────────────────────────────────────────────────────
async function poll() {
  try {
    const data = await spGet('/me/player/currently-playing');
    if (!data || !data.item) {
      document.getElementById('track-name').textContent = 'Nothing playing';
      document.getElementById('artist-name').textContent = '';
      document.getElementById('bpm-display').textContent = '— BPM';
      document.getElementById('status').style.display = 'block';
      clearLD(); return;
    }
    const track = data.item, artist = track.artists.map(a=>a.name).join(', ');
    document.getElementById('track-name').textContent = track.name;
    document.getElementById('artist-name').textContent = artist;
    document.getElementById('status').style.display = 'none';
    playbackMs = data.progress_ms || 0;
    lastPollAt = Date.now();

    if (track.id !== currentTrackId) {
      currentTrackId = track.id;
      const af = await spGet('/audio-features/' + track.id);
      if (af && af.tempo) {
        tempo = af.tempo;
        energy = af.energy || 0.5;
        document.getElementById('bpm-display').textContent = Math.round(tempo) + ' BPM';
        if (lightsActive) startBeatSync();
      }
      const [videoId] = await Promise.all([
        searchYT(artist, track.name),
        fetchLyrics(track.artists[0].name, track.name, track.album && track.album.name)
      ]);
      if (videoId) loadVideo(videoId);
      else showNoVideo();
    }
  } catch(e) { console.warn('Poll:', e); }
}

// ── INIT ──────────────────────────────────────────────────────────────────────
async function init() {
  const params = new URLSearchParams(window.location.search), code = params.get('code');
  if (code) {
    history.replaceState({}, '', ' ');
    try {
      accessToken = await exchangeCode(code);
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('player').style.display = 'block';
      await poll();
      pollTimer = setInterval(poll, 4000);
    } catch(e) { alert('Auth failed. Redirect URI must match: ' + REDIRECT_URI); }
  }
}
init();
</script>
