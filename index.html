<!DOCTYPE html>
<html lang="en">

<style>

  .sub { font-size: 0.65rem; letter-spacing: 0.35em; color: #444; text-transform: uppercase; margin-bottom: 3rem; }
  .connect-btn { background: #1DB954; color: #000; border: none; padding: 15px 52px; border-radius: 40px; font-family: 'DM Mono', monospace; font-size: 0.8rem; letter-spacing: 0.18em; text-transform: uppercase; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; box-shadow: 0 0 50px rgba(29,185,84,0.25); }
  .connect-btn:hover { transform: scale(1.05); box-shadow: 0 0 70px rgba(29,185,84,0.5); }

  #player { display: none; width: 100vw; height: 100vh; position: relative; background: #000; }

  /* Canvas always behind everything */
  #canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; }

  /* YT sits above canvas, below overlay */
  #yt-embed { position: absolute; inset: 0; z-index: 2; display: none; pointer-events: none; }
  #yt-embed iframe { width: 100%; height: 100%; border: none; }

  /* When video is showing, canvas dims */
  #player.video-on #canvas { opacity: 0.35; }
  #player.video-on #yt-embed { display: block; }

  #overlay { position: absolute; bottom: 0; left: 0; right: 0; z-index: 10; padding: 120px 40px 32px; background: linear-gradient(transparent, rgba(0,0,0,0.93)); display: flex; flex-direction: column; gap: 10px; }
  #lyrics-block { text-align: center; min-height: 5rem; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; gap: 4px; margin-bottom: 8px; }
  #lyric-prev { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 0.08em; color: rgba(255,255,255,0.18); transition: all 0.5s; }
  #lyric-current { font-family: 'Bebas Neue', sans-serif; font-size: 2.4rem; letter-spacing: 0.07em; color: #fff; text-shadow: 0 0 40px var(--theme-glow, rgba(255,255,255,0.5)); transition: color 0.6s, text-shadow 0.6s; line-height: 1.1; }
  #lyric-next { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 0.08em; color: rgba(255,255,255,0.22); transition: all 0.5s; }
  #theme-label { text-align: center; font-size: 0.52rem; letter-spacing: 0.3em; text-transform: uppercase; color: rgba(255,255,255,0.18); min-height: 1rem; }
  #track-row { display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; }
  #track-name { font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; letter-spacing: 0.07em; line-height: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 60vw; }
  #artist-name { font-size: 0.65rem; letter-spacing: 0.22em; color: #444; margin-top: 4px; text-transform: uppercase; }
  #right-hud { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; flex-shrink: 0; }
  #mode-badge { font-size: 0.55rem; letter-spacing: 0.2em; text-transform: uppercase; color: #1DB954; border: 1px solid rgba(29,185,84,0.3); border-radius: 20px; padding: 4px 12px; }
  #bpm-display { font-size: 0.55rem; letter-spacing: 0.15em; color: #252525; }
  #controls { position: absolute; top: 18px; right: 18px; z-index: 20; display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
  .ctrl { background: rgba(0,0,0,0.55); border: 1px solid rgba(255,255,255,0.07); color: #444; font-family: 'DM Mono', monospace; font-size: 0.56rem; letter-spacing: 0.18em; text-transform: uppercase; padding: 7px 13px; border-radius: 20px; cursor: pointer; transition: color 0.2s, border-color 0.2s; backdrop-filter: blur(10px); }
  .ctrl:hover { color: #aaa; border-color: rgba(255,255,255,0.18); }
  .ctrl.active { color: #1DB954; border-color: rgba(29,185,84,0.4); }
  .ctrl.lights-on { color: #ffcc00; border-color: rgba(255,204,0,0.4); }
  #status { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); z-index: 5; text-align: center; pointer-events: none; }
  #status p { font-size: 0.68rem; letter-spacing: 0.25em; color: #1a1a1a; text-transform: uppercase; }
  #sp-logo { position: absolute; top: 20px; left: 22px; z-index: 10; display: flex; align-items: center; gap: 8px; opacity: 0.3; }
  #sp-logo svg { width: 14px; height: 14px; fill: #1DB954; }
  #sp-logo span { font-size: 0.55rem; letter-spacing: 0.2em; color: #2a2a2a; text-transform: uppercase; }
  #ha-modal { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.9); backdrop-filter: blur(14px); align-items: center; justify-content: center; }
  #ha-modal.open { display: flex; }
  #ha-box { background: #060606; border: 1px solid #181818; border-radius: 18px; padding: 32px; width: 500px; max-width: 92vw; max-height: 80vh; overflow-y: auto; }
  #ha-box h2 { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; letter-spacing: 0.1em; margin-bottom: 4px; }
  #ha-box .hint { font-size: 0.6rem; color: #333; letter-spacing: 0.12em; margin-bottom: 20px; text-transform: uppercase; }
  #ha-status { font-size: 0.6rem; color: #444; letter-spacing: 0.1em; margin-bottom: 12px; min-height: 1rem; }
  #lights-list { display: flex; flex-direction: column; gap: 5px; margin-bottom: 18px; }
  .light-item { display: flex; align-items: center; gap: 12px; padding: 10px 14px; border: 1px solid #141414; border-radius: 10px; cursor: pointer; transition: border-color 0.2s, background 0.2s; }
  .light-item:hover { border-color: #252525; }
  .light-item.selected { border-color: rgba(29,185,84,0.4); background: rgba(29,185,84,0.04); }
  .light-dot { width: 8px; height: 8px; border-radius: 50%; background: #ffcc00; flex-shrink: 0; box-shadow: 0 0 5px rgba(255,204,0,0.4); }
  .light-name { font-size: 0.68rem; letter-spacing: 0.08em; color: #999; flex: 1; }
  .light-check { font-size: 0.68rem; color: #1DB954; opacity: 0; transition: opacity 0.2s; }
  .light-item.selected .light-check { opacity: 1; }
  #ha-btn-row { display: flex; gap: 10px; }
  .ha-btn { flex: 1; padding: 12px; border-radius: 10px; border: none; font-family: 'DM Mono', monospace; font-size: 0.68rem; letter-spacing: 0.12em; text-transform: uppercase; cursor: pointer; transition: opacity 0.2s; }

<script>
const CLIENT_ID    = '23267977d16d48e1a9495de2b38e63c1';
const REDIRECT_URI = 'https://natev42.github.io/spotify-viz';
const SCOPES       = 'user-read-currently-playing user-read-playback-state';
const YT_KEY       = 'AIzaSyCDR7-_K3eMUaijeS7zo0nD1gv0vnDIs4Y';

const HA_TOKEN     = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiI3MWU4MzZjZmMxMjY0NjMzOTc3NDEzYjVjNDc1NWUxZCIsImlhdCI6MTc3Nzg0NDUxNywiZXhwIjoyMDkzMjA0NTE3fQ.isDztHb5r-xuHTFMBfm5fep9mhdssU73NhmDWIhu5RE';
const YT_START     = 10;

let accessToken    = null;
let currentTrackId = null;
let audioFeatures  = null;
let animFrame      = null;
let pollTimer      = null;
let videoOn        = false;
let hasVideo       = false;
let lightsActive   = false;
let analyser       = null;
let allLights      = [];
let selectedLights = [];
let lastLightBeat  = 0;

let currentLyricIdx= -1;
let playbackMs     = 0;
let lastPollAt     = 0;

// ── KEYWORD THEME ENGINE ──────────────────────────────────────────────────────
const THEME_KEYWORDS = {
  money:  ['money','cash','dollar','rich','wealth','bank','paid','check','bands','guap','bread','paper','hustle','grind','boss','drip','gold','spend','bought','buy','sell','profit','coin','bills','stack','bag','flex'],
  fire:   ['fire','burn','flame','hot','heat','blaze','lit','smoke','ash','inferno','torch','ignite','spark','sizzle','blazing','hell','demon','devil','rage','angry','furious','explode','bomb'],
  love:   ['love','heart','kiss','baby','babe','darling','forever','together','hold','touch','feel','romance','roses','beautiful','gorgeous','lovely','adore','cherish','miss','need','want','dream of you','eyes','smile','soul','honey'],
  space:  ['space','stars','galaxy','universe','planet','moon','sky','cosmos','orbit','infinite','beyond','light years','supernova','rocket','float','gravity','astral','celestial','midnight','heaven','above','fly','higher','cloud'],
  rain:   ['rain','storm','thunder','lightning','wet','tears','cry','pour','flood','drown','water','waves','ocean','river','drops','hurricane','grey','gray','dark sky','umbrella','cold night'],
  party:  ['party','dance','club','night','turn up','vibe','shot','drink','drunk','celebrate','dj','bass','crowd','wild','crazy','jump','bounce','move','groove','banger','loud','anthem'],
  nature: ['trees','flowers','garden','green','nature','forest','birds','breeze','sunshine','meadow','bloom','grow','earth','spring','leaves','petals','butterflies','peaceful','serene','alive','grass','mountains','fresh'],
  cold:   ['cold','ice','frozen','winter','snow','freeze','chill','numb','alone','empty','hollow','dark','lonely','lost','silence','quiet','nothing','void','distant','far','gone','leaving'],
  dark:   ['dark','shadow','death','die','blood','knife','gun','war','pain','suffer','broken','shattered','chaos','destroy','hate','revenge','enemy','villain','monster','fear','nightmare','trapped','falling'],
  energy: ['run','fast','power','strong','unstoppable','champion','win','fight','warrior','beast','hustle','never stop','push','drive','fuel','electric','charged','surge','rush','speed','go'],
  sad:    ['sad','hurt','pain','cry','broken','alone','miss','gone','lost','leave','goodbye','over','end','empty','hollow','depression','tears','heartbreak','regret','sorry','wish','remember','used to'],
  dream:  ['dream','imagine','wonder','magic','fantasy','wish','hope','believe','vision','surreal','floating','ethereal','clouds','escape','another world','free','transcend','beyond','infinite','possibilities','tomorrow'],
};
function detectTheme(text) {
  if (!text) return 'default';
  const lower = text.toLowerCase();
  const scores = {};
  for (const [t, words] of Object.entries(THEME_KEYWORDS)) {
    scores[t] = words.reduce((n, w) => n + (lower.includes(w) ? w.split(' ').length : 0), 0);
  }
  const best = Object.entries(scores).sort((a,b)=>b[1]-a[1])[0];
  return best[1] > 0 ? best[0] : 'default';
}

const THEMES = {
  money:   { hBase:45,  hAccent:55,  hTriad:30,  pType:'money', bg:'gold',   fx:null },
  fire:    { hBase:10,  hAccent:30,  hTriad:50,  pType:'fire',  bg:'fire',   fx:null },
  love:    { hBase:340, hAccent:310, hTriad:20,  pType:'heart', bg:'neon',   fx:null },
  space:   { hBase:220, hAccent:260, hTriad:180, pType:'star',  bg:'space',  fx:'aurora' },
  rain:    { hBase:200, hAccent:220, hTriad:180, pType:'rain',  bg:'ocean',  fx:null },
  party:   { hBase:280, hAccent:60,  hTriad:160, pType:'spark', bg:'club',   fx:'strobe' },
  nature:  { hBase:120, hAccent:80,  hTriad:160, pType:'petal', bg:'forest', fx:null },
  cold:    { hBase:190, hAccent:210, hTriad:170, pType:'snow',  bg:'space',  fx:null },
  dark:    { hBase:260, hAccent:240, hTriad:300, pType:'spark', bg:'void',   fx:'tunnel' },
  energy:  { hBase:50,  hAccent:20,  hTriad:280, pType:'spark', bg:'neon',   fx:'strobe' },
  sad:     { hBase:220, hAccent:200, hTriad:240, pType:'rain',  bg:'ocean',  fx:null },
  dream:   { hBase:280, hAccent:320, hTriad:200, pType:'star',  bg:'space',  fx:'aurora' },
  default: { hBase:200, hAccent:340, hTriad:60,  pType:'spark', bg:'club',   fx:null },
};
let theme = { ...THEMES.default, name:'default' };

function setTheme(name) {
  if (!THEMES[name] || name === theme.name) return;
  theme = { ...THEMES[name], name };
  document.getElementById('theme-label').textContent = name;
  document.documentElement.style.setProperty('--theme-glow', `hsla(${theme.hBase},90%,65%,0.7)`);
  document.getElementById('lyric-current').style.color = `hsl(${theme.hBase},95%,85%)`;
}

// ── AUTH ──────────────────────────────────────────────────────────────────────
async function genVerifier() {
  const a = new Uint8Array(32); crypto.getRandomValues(a);
  return btoa(String.fromCharCode(...a)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}
async function genChallenge(v) {
  const d = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(v));
  return btoa(String.fromCharCode(...new Uint8Array(d))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}
async function login() {
  const v = await genVerifier(), c = await genChallenge(v);
  sessionStorage.setItem('pkce', v);
  window.location = 'https://accounts.spotify.com/authorize?' + new URLSearchParams({ client_id:CLIENT_ID, response_type:'code', redirect_uri:REDIRECT_URI, scope:SCOPES, code_challenge_method:'S256', code_challenge:c });
}
async function exchangeCode(code) {
  const r = await fetch('https://accounts.spotify.com/api/token', { method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body: new URLSearchParams({ grant_type:'authorization_code', code, redirect_uri:REDIRECT_URI, client_id:CLIENT_ID, code_verifier:sessionStorage.getItem('pkce') })});
  return (await r.json()).access_token;
}

// ── SPOTIFY ───────────────────────────────────────────────────────────────────
async function spotifyGet(path) {
  const r = await fetch('https://api.spotify.com/v1'+path, { headers:{ Authorization:'Bearer '+accessToken }});
  if (r.status===204||r.status===401) return null;
  return r.json();
}

// ── YOUTUBE ───────────────────────────────────────────────────────────────────
async function searchYT(artist, track) {
  const q = encodeURIComponent(artist+' '+track+' official music video');
  try {
    const r = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${q}&type=video&videoCategoryId=10&maxResults=1&key=${YT_KEY}`);
    const d = await r.json();
    if (d.items && d.items.length > 0) return d.items[0].id.videoId;
  } catch(e) { console.warn('YT search failed', e); }
  return null;
}

function embedYT(videoId) {
  document.getElementById('yt-embed').innerHTML =
    `<iframe src="https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1&rel=0&modestbranding=1&controls=0&loop=1&playlist=${videoId}&start=${YT_START}" allow="autoplay; fullscreen" allowfullscreen></iframe>`;
  hasVideo = true;
  document.getElementById('vid-btn').style.display = 'block';
  document.getElementById('mode-badge').textContent = 'Visualizer + Video';
  // Auto show video when found
  videoOn = true;
  document.getElementById('player').classList.add('video-on');
  document.getElementById('vid-btn').textContent = 'Hide Video';
}

function clearYT() {
  document.getElementById('yt-embed').innerHTML = '';
  hasVideo = false;
  videoOn = false;
  document.getElementById('player').classList.remove('video-on');
  document.getElementById('vid-btn').textContent = 'Show Video';
  document.getElementById('mode-badge').textContent = 'Visualizer';
}

function toggleVideo() {
  if (!hasVideo) return;
  videoOn = !videoOn;
  document.getElementById('player').classList.toggle('video-on', videoOn);
  document.getElementById('vid-btn').textContent = videoOn ? 'Hide Video' : 'Show Video';
}

// ── LRCLIB LYRICS ─────────────────────────────────────────────────────────────
async function fetchLyrics(artist, track, album) {
  syncedLyrics = []; currentLyricIdx = -1;
  clearLyricDisplay();
  try {
    const q = new URLSearchParams({ artist_name:artist, track_name:track });
    if (album) q.set('album_name', album);
    const r = await fetch(`https://lrclib.net/api/get?${q}`);
    if (!r.ok) return;
    const d = await r.json();
    if (d.syncedLyrics) syncedLyrics = parseLRC(d.syncedLyrics);
    else if (d.plainLyrics) {
      const lines = d.plainLyrics.split('\n').filter(l=>l.trim());
      syncedLyrics = lines.map((text,i)=>({ time:(i/lines.length)*180000, text }));
    }
  } catch(e) { console.warn('Lyrics failed',e); }
}
function parseLRC(lrc) {
  return lrc.split('\n').reduce((acc,line)=>{
    const m=line.match(/^\[(\d+):(\d+\.\d+)\](.*)/);
    if (m) { const ms=parseInt(m[1])*60000+parseFloat(m[2])*1000, text=m[3].trim(); if(text) acc.push({time:ms,text}); }
    return acc;
  },[]).sort((a,b)=>a.time-b.time);
}
function clearLyricDisplay() {
  ['lyric-prev','lyric-current','lyric-next','theme-label'].forEach(id=>document.getElementById(id).textContent='');
}
function tickLyrics() {
  if (!syncedLyrics.length) return;
  const now = playbackMs+(Date.now()-lastPollAt);
  let idx=-1;
  for (let i=0;i<syncedLyrics.length;i++) { if(syncedLyrics[i].time<=now) idx=i; else break; }
  if (idx!==currentLyricIdx&&idx>=0) {
    currentLyricIdx=idx;
    const cur=syncedLyrics[idx], prev=syncedLyrics[idx-1], next=syncedLyrics[idx+1];
    document.getElementById('lyric-prev').textContent    = prev?prev.text:'';
    document.getElementById('lyric-current').textContent = cur.text;
    document.getElementById('lyric-next').textContent    = next?next.text:'';
    setTheme(detectTheme([prev,cur,next].filter(Boolean).map(l=>l.text).join(' ')));
  }
}

// ── HOME ASSISTANT ────────────────────────────────────────────────────────────

  try { return (await fetch(HA_URL+'/api'+path,{headers:{Authorization:'Bearer '+HA_TOKEN,'Content-Type':'application/json'}})).json(); } catch(e){return null;}
}
async function haPost(path,body) {
  try { await fetch(HA_URL+'/api'+path,{method:'POST',headers:{Authorization:'Bearer '+HA_TOKEN,'Content-Type':'application/json'},body:JSON.stringify(body)}); } catch(e){}
}
async function loadAllLights() {
  document.getElementById('ha-status').textContent='Connecting...';
  const states=await haGet('/states');
  if(!states){document.getElementById('ha-status').textContent='Could not reach HA — must be on home WiFi.';return;}
  allLights=states.filter(s=>s.entity_id.startsWith('light.'));
  document.getElementById('ha-status').textContent=`Found ${allLights.length} lights`;
  renderLightsList();
}
function renderLightsList() {
  const list=document.getElementById('lights-list'); list.innerHTML='';
  allLights.forEach(light=>{
    const sel=selectedLights.includes(light.entity_id);
    const div=document.createElement('div'); div.className='light-item'+(sel?' selected':'');
    div.innerHTML=`<div class="light-dot"></div><div class="light-name">${light.attributes.friendly_name||light.entity_id}</div><div class="light-check">✓</div>`;
    div.onclick=()=>{ selectedLights=selectedLights.includes(light.entity_id)?selectedLights.filter(id=>id!==light.entity_id):[...selectedLights,light.entity_id]; div.classList.toggle('selected',selectedLights.includes(light.entity_id)); div.querySelector('.light-check').style.opacity=selectedLights.includes(light.entity_id)?'1':'0'; };
    list.appendChild(div);
  });
}
function selectAll(){selectedLights=allLights.map(l=>l.entity_id);renderLightsList();}
function openLightsModal(){document.getElementById('ha-modal').classList.add('open');loadAllLights();}
function closeLightsModal(){document.getElementById('ha-modal').classList.remove('open');}
function saveLights(){lightsActive=selectedLights.length>0;document.getElementById('lights-btn').classList.toggle('lights-on',lightsActive);closeLightsModal();}
async function syncLights(pulse,energy) {
  if(!lightsActive||!selectedLights.length) return;
  const now=Date.now(); if(pulse<0.65||now-lastLightBeat<220) return;
  lastLightBeat=now;
  const bri=Math.round(130+energy*120);
  selectedLights.forEach(id=>haPost('/services/light/turn_on',{entity_id:id,hs_color:[theme.hBase,100],brightness:bri,transition:0}));
  setTimeout(()=>{if(!lightsActive)return;selectedLights.forEach(id=>haPost('/services/light/turn_on',{entity_id:id,brightness:Math.round(15+energy*35),transition:0}));},110);
}

// ── MIC ───────────────────────────────────────────────────────────────────────
async function tryMic() {
  try { const s=await navigator.mediaDevices.getUserMedia({audio:true}); const a=new AudioContext(); analyser=a.createAnalyser(); analyser.fftSize=512; a.createMediaStreamSource(s).connect(analyser); } catch(e){analyser=null;}
}

// ── VISUALIZER ────────────────────────────────────────────────────────────────
function startVis(features) {
  if (animFrame) cancelAnimationFrame(animFrame);
  const canvas=document.getElementById('canvas'), ctx=canvas.getContext('2d');
  const tempo=(features&&features.tempo)||120, energy=(features&&features.energy)||0.5, danceability=(features&&features.danceability)||0.5, beatMs=60000/tempo;
  function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
  resize(); window.onresize=resize;

  const NUM_P=Math.round(100+energy*150);
  const particles=Array.from({length:NUM_P},()=>spawnP());
  function spawnP(){const a=Math.random()*Math.PI*2,d=Math.random()*Math.min(canvas.width,canvas.height)*0.35;return{x:canvas.width/2+Math.cos(a)*d,y:canvas.height/2+Math.sin(a)*d,vx:(Math.random()-.5)*(1+energy*2.5),vy:(Math.random()-.5)*(1+energy*2.5),r:Math.random()*3+0.5,life:Math.random(),hue:theme.hBase+Math.random()*80-40,trail:[],type:theme.pType,spin:(Math.random()-.5)*0.2,angle:Math.random()*Math.PI*2};}

  const NUM_L=Math.round(5+energy*9);
  const lasers=Array.from({length:NUM_L},(_,i)=>({angle:(i/NUM_L)*Math.PI*2,speed:(Math.random()-.5)*0.007*(1+energy),width:Math.random()*1.5+0.5}));
  const smoke=Array.from({length:40},()=>mkSmoke());
  function mkSmoke(){return{x:Math.random()*canvas.width,y:canvas.height+20,vx:(Math.random()-.5)*0.5,vy:-(Math.random()*1+0.3),size:Math.random()*150+80,alpha:Math.random()*0.03+0.007,life:1};}
  const stars=Array.from({length:220},()=>({x:Math.random(),y:Math.random(),r:Math.random()*1.5+0.3,tw:Math.random()*Math.PI*2}));

  let lastBeat=performance.now(),beatPhase=0,subBeat=0,time=0;
  const RING=220,BARS=100;

  function drawP(p,pulse){
    const s=p.r*(0.5+pulse*0.9),alpha=p.life*(0.5+pulse*0.4);
    ctx.save();ctx.translate(p.x,p.y);p.angle+=p.spin*(1+pulse);ctx.rotate(p.angle);
    const t=p.type;
    if(t==='money'){ctx.fillStyle=`hsla(110,75%,50%,${alpha})`;ctx.fillRect(-s*1.3,-s*0.8,s*2.6,s*1.6);ctx.fillStyle=`hsla(110,60%,88%,${alpha})`;ctx.font=`bold ${Math.round(s*1.8)}px monospace`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('$',0,0);}
    else if(t==='heart'){ctx.fillStyle=`hsla(${p.hue},90%,65%,${alpha})`;ctx.beginPath();ctx.moveTo(0,-s*0.5);ctx.bezierCurveTo(s,-s*1.5,s*2,0,0,s*1.5);ctx.bezierCurveTo(-s*2,0,-s,-s*1.5,0,-s*0.5);ctx.fill();}
    else if(t==='star'){ctx.fillStyle=`hsla(${p.hue},90%,80%,${alpha})`;ctx.beginPath();for(let i=0;i<5;i++){const a1=(i*2/5)*Math.PI*2-Math.PI/2,a2=((i*2+1)/5)*Math.PI*2-Math.PI/2;(i===0?ctx.moveTo:ctx.lineTo).call(ctx,Math.cos(a1)*s*1.5,Math.sin(a1)*s*1.5);ctx.lineTo(Math.cos(a2)*s*0.6,Math.sin(a2)*s*0.6);}ctx.closePath();ctx.fill();}
    else if(t==='fire'){const fg=ctx.createRadialGradient(0,s,0,0,-s,s*2);fg.addColorStop(0,`hsla(50,100%,80%,${alpha})`);fg.addColorStop(0.4,`hsla(20,100%,60%,${alpha*0.7})`);fg.addColorStop(1,`hsla(0,100%,30%,0)`);ctx.fillStyle=fg;ctx.beginPath();ctx.ellipse(0,0,s*0.6,s*1.8,0,0,Math.PI*2);ctx.fill();}
    else if(t==='rain'){ctx.strokeStyle=`hsla(${p.hue},80%,70%,${alpha})`;ctx.lineWidth=s*0.4;ctx.beginPath();ctx.moveTo(0,-s*2);ctx.lineTo(0,s*2);ctx.stroke();}
    else if(t==='snow'){ctx.strokeStyle=`hsla(200,60%,90%,${alpha})`;ctx.lineWidth=s*0.35;for(let i=0;i<6;i++){const a=(i/6)*Math.PI*2;ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(Math.cos(a)*s*1.8,Math.sin(a)*s*1.8);ctx.stroke();}}
    else if(t==='petal'){ctx.fillStyle=`hsla(${p.hue},80%,70%,${alpha})`;ctx.beginPath();ctx.ellipse(0,-s,s*0.5,s*1.2,0,0,Math.PI*2);ctx.fill();}
    else{ctx.beginPath();ctx.arc(0,0,s,0,Math.PI*2);ctx.fillStyle=`hsla(${p.hue},88%,72%,${alpha})`;ctx.fill();}
    ctx.restore();
  }

  function draw(now){
    animFrame=requestAnimationFrame(draw);
    time=now*0.001;
    const T=theme,hB=T.hBase,hA=T.hAccent,hT=T.hTriad;
    if(now-lastBeat>=beatMs){lastBeat=now;beatPhase=1.0;subBeat=(subBeat+1)%4;syncLights(beatPhase,energy);}
    beatPhase*=(0.78+danceability*0.12);
    let mic=0;
    if(analyser){const b=new Uint8Array(analyser.frequencyBinCount);analyser.getByteFrequencyData(b);mic=b.reduce((a,v)=>a+v,0)/b.length/255;}
    const pulse=Math.max(beatPhase,mic*1.8);
    const cx=canvas.width/2,cy=canvas.height/2,baseR=Math.min(canvas.width,canvas.height)*0.22;

    ctx.fillStyle=`rgba(0,0,0,${0.07+(1-energy)*0.05})`;ctx.fillRect(0,0,canvas.width,canvas.height);

    if(['space','dream','cold'].includes(T.bg)){stars.forEach(s=>{s.tw+=0.01;const tw=0.5+0.5*Math.sin(s.tw);ctx.beginPath();ctx.arc(s.x*canvas.width,s.y*canvas.height,s.r*tw,0,Math.PI*2);ctx.fillStyle=`rgba(200,220,255,${0.3*tw+pulse*0.18})`;ctx.fill();});}
    if(T.bg==='fire'){const fg=ctx.createLinearGradient(0,canvas.height,0,canvas.height*0.4);fg.addColorStop(0,`hsla(15,100%,25%,${0.08+pulse*0.12})`);fg.addColorStop(1,'transparent');ctx.fillStyle=fg;ctx.fillRect(0,0,canvas.width,canvas.height);}
    if(T.bg==='gold'){const gg=ctx.createRadialGradient(cx,cy,0,cx,cy,canvas.width*0.7);gg.addColorStop(0,`hsla(45,100%,28%,${0.07+pulse*0.1})`);gg.addColorStop(1,'transparent');ctx.fillStyle=gg;ctx.fillRect(0,0,canvas.width,canvas.height);}
    if(T.bg==='ocean'||T.bg==='sad'){const og=ctx.createLinearGradient(0,0,0,canvas.height);og.addColorStop(0,`hsla(210,80%,8%,${0.05+pulse*0.06})`);og.addColorStop(1,`hsla(190,80%,4%,0.04)`);ctx.fillStyle=og;ctx.fillRect(0,0,canvas.width,canvas.height);}
    if(T.bg==='forest'){const fg=ctx.createLinearGradient(0,canvas.height,0,0);fg.addColorStop(0,`hsla(120,60%,8%,${0.07+pulse*0.08})`);fg.addColorStop(1,'transparent');ctx.fillStyle=fg;ctx.fillRect(0,0,canvas.width,canvas.height);}

    if(['club','neon','void','gold'].includes(T.bg)){smoke.forEach((s,i)=>{s.x+=s.vx;s.y+=s.vy;s.life-=0.0012;if(s.life<=0||s.y<-s.size){smoke[i]=mkSmoke();return;}const sg=ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,s.size*(1+pulse*0.2));sg.addColorStop(0,`hsla(${hB+10},20%,50%,${s.alpha*(0.4+pulse*0.5)})`);sg.addColorStop(1,'transparent');ctx.fillStyle=sg;ctx.beginPath();ctx.arc(s.x,s.y,s.size,0,Math.PI*2);ctx.fill();});}

    if(T.fx==='aurora'){for(let a=0;a<3;a++){ctx.beginPath();ctx.moveTo(0,canvas.height*0.3);for(let x=0;x<=canvas.width;x+=20)ctx.lineTo(x,canvas.height*0.3+Math.sin(x*0.008+time*0.5+a)*80*(0.5+pulse*0.5));ctx.strokeStyle=`hsla(${(hB+a*30)%360},80%,60%,${0.07+pulse*0.1})`;ctx.lineWidth=30;ctx.stroke();}}

    for(let i=5;i>=1;i--){const r=baseR*i*(1+pulse*0.38*((6-i)/5)),a=0.022+pulse*0.085*(i/5);const g=ctx.createRadialGradient(cx,cy,r*0.1,cx,cy,r);g.addColorStop(0,`hsla(${hB+i*20},80%,58%,${a*1.8})`);g.addColorStop(0.5,`hsla(${hA},65%,45%,${a})`);g.addColorStop(1,'transparent');ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();}

    lasers.forEach((l,i)=>{const lh=(hB+i*(360/NUM_L))%360;l.angle+=l.speed*(1+pulse*3.5);const len=Math.max(canvas.width,canvas.height)*1.7,la=0.05+pulse*0.35;const x2=cx+Math.cos(l.angle)*len,y2=cy+Math.sin(l.angle)*len;const lg=ctx.createLinearGradient(cx,cy,x2,y2);lg.addColorStop(0,`hsla(${lh},100%,72%,${la})`);lg.addColorStop(0.3,`hsla(${lh},90%,60%,${la*0.3})`);lg.addColorStop(1,'transparent');ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(x2,y2);ctx.strokeStyle=lg;ctx.lineWidth=l.width*(1+pulse*5);ctx.stroke();const x3=cx-Math.cos(l.angle)*len,y3=cy-Math.sin(l.angle)*len;const lg2=ctx.createLinearGradient(cx,cy,x3,y3);lg2.addColorStop(0,`hsla(${(lh+180)%360},100%,72%,${la})`);lg2.addColorStop(1,'transparent');ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(x3,y3);ctx.strokeStyle=lg2;ctx.lineWidth=l.width*(1+pulse*5);ctx.stroke();});

    if(T.fx==='tunnel'){for(let t=0;t<10;t++){const tr=baseR*(0.1+t*0.09+pulse*0.04);ctx.beginPath();for(let s=0;s<=6;s++){const a=(s/6)*Math.PI*2-Math.PI/6+time*0.25*(t%2===0?1:-1);(s===0?ctx.moveTo:ctx.lineTo).call(ctx,cx+Math.cos(a)*tr,cy+Math.sin(a)*tr);}ctx.closePath();ctx.strokeStyle=`hsla(${(hT+t*25)%360},80%,65%,${0.07+pulse*0.25})`;ctx.lineWidth=0.8+pulse;ctx.stroke();}}

    for(let ring=0;ring<2;ring++){ctx.beginPath();for(let i=0;i<=RING;i++){const a=(i/RING)*Math.PI*2-Math.PI/2+ring*0.05,w=Math.sin(i*0.15+time*(2.5+ring*1.2))*0.5+Math.sin(i*0.07+time*(1.3+ring*0.8))*0.5+Math.sin(i*0.3+time*4+pulse*2)*0.3*pulse,dist=baseR*((ring===0?0.85:0.76)+w*0.1*energy+pulse*(0.22-ring*0.06));(i===0?ctx.moveTo:ctx.lineTo).call(ctx,cx+Math.cos(a)*dist,cy+Math.sin(a)*dist);}ctx.closePath();ctx.strokeStyle=`hsla(${ring===0?hB:hA},88%,68%,${(0.28-ring*0.1)+pulse*(0.5-ring*0.15)})`;ctx.lineWidth=(1.5-ring*0.5)+pulse*(3-ring*0.8);ctx.stroke();}

    for(let i=0;i<BARS;i++){const a=(i/BARS)*Math.PI*2-Math.PI/2,bp=pulse*(0.5+0.5*Math.abs(Math.sin(i*0.2+time*2.1+subBeat*0.8))),iR=baseR*1.02,oR=iR+baseR*(0.05+bp*energy*1.5);ctx.beginPath();ctx.moveTo(cx+Math.cos(a)*iR,cy+Math.sin(a)*iR);ctx.lineTo(cx+Math.cos(a)*oR,cy+Math.sin(a)*oR);ctx.strokeStyle=`hsla(${(hB+i*(260/BARS))%360},95%,70%,${0.35+bp*0.65})`;ctx.lineWidth=2+pulse*2.5;ctx.stroke();}

    const orbR=baseR*(0.17+pulse*0.2),og=ctx.createRadialGradient(cx,cy,0,cx,cy,orbR);og.addColorStop(0,`hsla(${hB},100%,94%,${0.5+pulse*0.5})`);og.addColorStop(0.35,`hsla(${hA},88%,68%,${0.28+pulse*0.38})`);og.addColorStop(1,`hsla(${hT},70%,40%,0)`);ctx.beginPath();ctx.arc(cx,cy,orbR,0,Math.PI*2);ctx.fillStyle=og;ctx.fill();

    particles.forEach((p,idx)=>{
      if(Math.random()<0.008){p.type=theme.pType;p.hue=theme.hBase+Math.random()*60-30;}
      p.trail.push({x:p.x,y:p.y});if(p.trail.length>10)p.trail.shift();
      if(p.type==='rain'){p.vy=Math.abs(p.vy)*1.02+0.5;}else if(p.type==='snow'){p.vx+=Math.sin(time+p.life*10)*0.05;p.vy=Math.abs(p.vy)*0.3+0.2;}else if(p.type==='fire'){p.vy-=0.08;p.vx+=(Math.random()-.5)*0.1;}else if(p.type==='money'){p.vy+=0.04;p.vx+=Math.sin(time*2+p.life*5)*0.05;}
      p.x+=p.vx*(1+pulse*2.5);p.y+=p.vy*(1+pulse*2);p.life-=0.003+pulse*0.005;
      if(p.life<=0||p.x<-30||p.x>canvas.width+30||p.y<-30||p.y>canvas.height+30){particles[idx]=spawnP();return;}
      if(p.trail.length>2&&p.type==='spark'){ctx.beginPath();ctx.moveTo(p.trail[0].x,p.trail[0].y);p.trail.forEach(pt=>ctx.lineTo(pt.x,pt.y));ctx.strokeStyle=`hsla(${p.hue},80%,65%,${p.life*0.22})`;ctx.lineWidth=p.r*0.5;ctx.stroke();}
      drawP(p,pulse);
    });

    if(T.fx==='strobe'&&beatPhase>0.82){ctx.fillStyle=`rgba(255,255,255,${(beatPhase-0.82)*0.38})`;ctx.fillRect(0,0,canvas.width,canvas.height);}
    if(pulse>0.4){const fa=(pulse-0.4)*0.22;const fg=ctx.createRadialGradient(cx,cy,0,cx,cy,Math.min(canvas.width,canvas.height)*0.75);fg.addColorStop(0,`hsla(${hB},100%,82%,${fa})`);fg.addColorStop(1,'transparent');ctx.fillStyle=fg;ctx.fillRect(0,0,canvas.width,canvas.height);}
    const vg=ctx.createRadialGradient(cx,cy,canvas.height*0.25,cx,cy,canvas.height*0.9);vg.addColorStop(0,'transparent');vg.addColorStop(1,'rgba(0,0,0,0.6)');ctx.fillStyle=vg;ctx.fillRect(0,0,canvas.width,canvas.height);

    tickLyrics();
  }
  draw(performance.now());
}

// ── CONTROLS ──────────────────────────────────────────────────────────────────
function toggleFullscreen(){if(!document.fullscreenElement)document.documentElement.requestFullscreen();else document.exitFullscreen();}
function logout(){accessToken=null;currentTrackId=null;clearInterval(pollTimer);if(animFrame)cancelAnimationFrame(animFrame);document.getElementById('player').style.display='none';document.getElementById('login-screen').style.display='flex';}

// ── POLL ──────────────────────────────────────────────────────────────────────
async function poll() {
  try {
    const data=await spotifyGet('/me/player/currently-playing');
    if(!data||!data.item){document.getElementById('track-name').textContent='Nothing playing';document.getElementById('artist-name').textContent='';document.getElementById('bpm-display').textContent='— BPM';document.getElementById('status').style.display='block';clearLyricDisplay();return;}
    const track=data.item,artist=track.artists.map(a=>a.name).join(', ');
    document.getElementById('track-name').textContent=track.name;
    document.getElementById('artist-name').textContent=artist;
    document.getElementById('status').style.display='none';
    playbackMs=data.progress_ms||0;lastPollAt=Date.now();
    if(track.id!==currentTrackId){
      currentTrackId=track.id;setTheme('default');
      audioFeatures=await spotifyGet('/audio-features/'+track.id);
      if(audioFeatures&&audioFeatures.tempo)document.getElementById('bpm-display').textContent=Math.round(audioFeatures.tempo)+' BPM';
      const[videoId]=await Promise.all([searchYT(artist,track.name),fetchLyrics(track.artists[0].name,track.name,track.album&&track.album.name)]);
      if(videoId)embedYT(videoId);else clearYT();
      startVis(audioFeatures);
    }
  } catch(e){console.warn('Poll error',e);}
}

// ── INIT ──────────────────────────────────────────────────────────────────────
async function init() {
  const params=new URLSearchParams(window.location.search),code=params.get('code');
  if(code){
    history.replaceState({},'',' ');
    try{
      accessToken=await exchangeCode(code);
      document.getElementById('login-screen').style.display='none';
      document.getElementById('player').style.display='block';
      await tryMic();await poll();
      pollTimer=setInterval(poll,4000);
    }catch(e){alert('Auth failed. Redirect URI must match: '+REDIRECT_URI);}
  }
}
init();
</script>
